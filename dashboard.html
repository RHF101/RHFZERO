<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHF ZERO • Forum & Marketplace</title>
  <style>
    body { background:#111; color:#0f0; font-family:monospace; margin:0; padding:20px; }
    .nav { background:#000; padding:15px; margin-bottom:20px; border-bottom:2px solid #0f0; }
    .tab { display:none; }
    .active { display:block; }
    .post, .product { background:#1a1a1a; padding:15px; margin:10px 0; border:1px solid #0f0; }
    button, input { background:#222; color:#0f0; border:1px solid #0f0; padding:8px; margin:5px; }
  </style>
</head>
<body>
  <div class="nav">
    <h1>RHF ZERO</h1>
    <button onclick="switchTab(0)">Forum Diskusi</button>
    <button onclick="switchTab(1)">Marketplace Tools</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Forum Tab -->
  <div id="tab0" class="tab active">
    <h2>Forum Diskusi</h2>
    <div id="threads"></div>
    <input id="newThreadTitle" placeholder="Judul thread baru" style="width:80%">
    <button onclick="createThread()">Buat Thread</button>
  </div>

  <!-- Marketplace Tab -->
  <div id="tab1" class="tab">
    <h2>Marketplace Tools</h2>
    <div id="products"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const app = initializeApp({ /* sama config di atas */ });
    const db = getDatabase(app);

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab'+n).classList.add('active');
    }

    // Load threads sederhana
    onValue(ref(db, 'threads'), (snap) => {
      const container = document.getElementById('threads');
      container.innerHTML = '';
      snap.forEach(child => {
        const data = child.val();
        container.innerHTML += `<div class="post"><strong>${data.title}</strong><p>${data.content||''}</p></div>`;
      });
    });

    window.createThread = function() {
      const title = document.getElementById('newThreadTitle').value;
      if (!title) return;
      push(ref(db, 'threads'), {
        title: title,
        content: "Diskusi baru...",
        timestamp: Date.now()
      });
      document.getElementById('newThreadTitle').value = '';
    };

    // Logout
    window.logout = function() {
      localStorage.removeItem('rhf_access');
      window.location.href = "index.html";
    };

    // TODO: Tambahkan produk, auth check, dll.
    console.log("%cRHF ZERO LOADED - Secure Mode", "color:#0f0; font-size:14px");
  </script>
</body>
</html>
