<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - RHF ZERO</title>
  <style>
    body { 
      background: #000; 
      color: #0f0; 
      font-family: monospace; 
      text-align: center; 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      height: 100vh;
    }
    .error { 
      font-size: 15vw; 
      margin-top: 20vh; 
      cursor: pointer; 
      user-select: none; 
      text-shadow: 0 0 10px #0f0;
    }
    #gate { 
      display: none; 
      position: fixed; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,30,0,0.95); 
      padding: 20px; 
      border: 1px solid #0f0; 
      width: 90%; 
      max-width: 420px; 
      box-shadow: 0 0 20px #0f0;
    }
    input { 
      background: transparent; 
      border: 1px solid #0f0; 
      color: #0f0; 
      padding: 12px; 
      width: 100%; 
      font-family: monospace; 
      margin-bottom: 10px;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 12px 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .footer { position: fixed; bottom: 5px; font-size: 10px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="error" id="error">404</div>
  <p>Klik berulang untuk akses</p>
  
  <div id="gate">
    <h2>RHF ZERO GATE</h2>
    <p>Masukkan kode akses sekali pakai (dari Termux):</p>
    <input type="text" id="codeInput" placeholder="XXXXXXXXXXXXXXXX" maxlength="32">
    <button onclick="verifyCode()">VERIFIKASI</button>
  </div>

  <div class="footer">RHF ZERO • Secure Access • 2026</div>

  <script type="module">
    // === Firebase Config ===
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpcTgKGVavgPa0ymUrmAvEBpuJyPJBMOs",
      authDomain: "rhf-zero-7b9c4.firebaseapp.com",
      databaseURL: "https://rhf-zero-7b9c4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rhf-zero-7b9c4",
      storageBucket: "rhf-zero-7b9c4.firebasestorage.app",
      messagingSenderId: "618217684265",
      appId: "1:618217684265:web:bb77268b58ec702e328b38",
      measurementId: "G-BEGQRYXZ5F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let clickCount = 0;
    const errorEl = document.getElementById('error');
    errorEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        document.getElementById('gate').style.display = 'block';
        errorEl.style.opacity = '0.3';
      }
    });

    async function verifyCode() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      if (code.length < 8) {
        alert("Kode terlalu pendek!");
        return;
      }

      const codeRef = ref(db, 'accessCodes/' + code);
      try {
        const snapshot = await get(codeRef);
        if (snapshot.exists() && !snapshot.val().used) {
          await set(codeRef, { 
            used: true, 
            usedAt: Date.now(),
            ip: "hidden" // placeholder
          });
          
          await signInAnonymously(auth).catch(() => {});
          localStorage.setItem('rhf_access', 'granted');
          window.location.href = "dashboard.html";
        } else {
          alert("Kode invalid atau sudah digunakan.");
        }
      } catch(e) {
        alert("Error koneksi. Coba lagi.");
      }
    }

    // Anti bot sederhana
    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
