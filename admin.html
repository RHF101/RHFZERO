<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF ZERO • Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg:#070a08; --panel:#0d1310; --border:#1c2b22;
    --green:#00ff7b; --green-dim:#0a3d24; --text-dim:#7fa392;
    --danger:#ff4d4d; --warn:#ffcf3d; --accent:#00c968;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg); color:#e8fff2;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    margin:0; min-height:100vh;
  }
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-box{
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:32px 28px; width:100%; max-width:380px;
  }
  .login-box .icon-row{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .login-box h2{margin:0; font-size:17px;}
  .login-box p.sub{color:var(--text-dim); font-size:12px; margin:4px 0 22px; line-height:1.5;}
  label{display:block; font-size:11px; color:var(--text-dim); margin-bottom:6px; letter-spacing:0.4px; text-transform:uppercase; font-weight:600;}
  input{
    width:100%; background:#04100a; border:1px solid var(--border); color:#e8fff2;
    border-radius:9px; padding:12px 13px; font-family:inherit; font-size:14px; margin-bottom:14px; outline:none;
    transition:border-color .2s;
  }
  input:focus{border-color:var(--green);}
  .btn{
    background:linear-gradient(135deg, var(--green), var(--accent));
    color:#02160c; border:none; padding:12px 18px; border-radius:9px; font-weight:700; font-size:13px;
    cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    transition:filter .15s, transform .1s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn.small{padding:8px 12px; font-size:11.5px; width:auto;}
  .status-msg{font-size:12px; margin-top:12px; text-align:center; min-height:16px;}
  .status-msg.error{color:var(--danger);}
  .status-msg.ok{color:var(--green);}

  .app{display:none;}
  .topbar{
    background:linear-gradient(180deg, #0c120e, #080b09); border-bottom:1px solid var(--border);
    padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand svg{width:20px; height:20px;}
  .brand h1{font-size:15px; margin:0; font-weight:700;}
  .brand .tag{background:var(--danger); color:#fff; font-size:9px; padding:2px 7px; border-radius:20px; font-weight:700; letter-spacing:0.5px;}
  .icon-btn{
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .icon-btn:hover{border-color:var(--danger); color:var(--danger);}

  main{padding:22px 18px 60px; max-width:920px; margin:0 auto;}
  .tabs{display:flex; gap:8px; margin-bottom:20px; overflow-x:auto;}
  .tab{
    background:var(--panel); border:1px solid var(--border); color:var(--text-dim);
    padding:9px 16px; border-radius:9px; font-size:12.5px; cursor:pointer; white-space:nowrap; font-weight:600;
  }
  .tab.active{background:var(--green-dim); color:var(--green); border-color:var(--green);}

  .section{display:none;}
  .section.active{display:block;}

  .stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:22px;}
  .stat-card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px;}
  .stat-card .num{font-size:22px; font-weight:700; color:var(--green);}
  .stat-card .lbl{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .item{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
  .item .row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .item h4{margin:0 0 4px; font-size:13.5px;}
  .item .meta{font-size:11px; color:var(--text-dim); margin-bottom:6px;}
  .item .desc{font-size:12.5px; color:#cfe8db; line-height:1.5; margin-bottom:8px;}
  .item .actions{display:flex; gap:8px; flex-shrink:0;}
  .pill{font-size:10px; padding:3px 9px; border-radius:20px; font-weight:700;}
  .pill.pending{background:rgba(255,196,0,0.12); color:var(--warn);}
  .pill.approved{background:rgba(0,255,123,0.12); color:var(--green);}
  .pill.rejected{background:rgba(255,77,77,0.12); color:var(--danger);}
  .empty{color:var(--text-dim); font-size:13px; text-align:center; padding:40px 0;}

  .code-gen-box{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:20px;}
  .code-gen-box h3{margin:0 0 12px; font-size:14px;}
  .code-out{
    background:#04100a; border:1px solid var(--border); border-radius:9px; padding:12px;
    font-family:monospace; font-size:13px; color:var(--green); word-break:break-all; margin-top:10px; min-height:20px;
  }
  .log-entry{font-size:11.5px; color:var(--text-dim); padding:8px 0; border-bottom:1px solid var(--border);}
  .log-entry b{color:#e8fff2;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="icon-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00ff7b" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg>
      <h2>Admin Panel Login</h2>
    </div>
    <p class="sub">Akses terbatas. Setiap percobaan login tercatat, termasuk yang gagal.</p>
    <label>Email Admin</label>
    <input type="email" id="adminEmail" autocomplete="off" placeholder="admin@domain.com">
    <label>Password</label>
    <input type="password" id="adminPass" autocomplete="off" placeholder="••••••••">
    <button class="btn" id="loginBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#02160c" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      Masuk
    </button>
    <div class="status-msg" id="loginStatus"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00ff7b" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6l8-4z"/></svg>
      <h1>RHF ZERO</h1>
      <span class="tag">ADMIN</span>
    </div>
    <button class="icon-btn" id="logoutBtn" title="Keluar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </div>

  <main>
    <div class="tabs">
      <div class="tab active" data-tab="overview">Overview</div>
      <div class="tab" data-tab="codes">Access Codes</div>
      <div class="tab" data-tab="groups">Grup</div>
      <div class="tab" data-tab="sessions">Sessions</div>
      <div class="tab" data-tab="log">Audit Log</div>
    </div>

    <section class="section active" id="tab-overview">
      <div class="stat-row" id="statRow"></div>
      <div class="empty">Ringkasan aktivitas sistem RHF ZERO.</div>
    </section>

    <section class="section" id="tab-codes">
      <div class="code-gen-box">
        <h3>Generate Kode Akses Baru</h3>
        <label>Berlaku (jam)</label>
        <input type="text" id="codeHours" value="24">
        <button class="btn" id="genCodeBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#02160c" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Generate
        </button>
        <div class="code-out" id="codeOut">-</div>
      </div>
      <div id="codesList"></div>
    </section>

    <section class="section" id="tab-groups">
      <div id="groupsList"></div>
    </section>

    <section class="section" id="tab-sessions">
      <div id="sessionsList"></div>
    </section>

    <section class="section" id="tab-log">
      <div id="auditLogList"></div>
    </section>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getDatabase, ref, get, set, push, update, remove, onValue, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCpcTgKGVavgPa0ymUrmAvEBpuJyPJBMOs",
    authDomain: "rhf-zero-7b9c4.firebaseapp.com",
    databaseURL: "https://rhf-zero-7b9c4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rhf-zero-7b9c4",
    storageBucket: "rhf-zero-7b9c4.firebasestorage.app",
    messagingSenderId: "618217684265",
    appId: "1:618217684265:web:bb77268b58ec702e328b38",
    measurementId: "G-BEGQRYXZ5F"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let currentAdminUid = null;

  // ================= AUDIT LOG =================
  async function logAction(action, detail){
    try {
      await push(ref(db, 'adminAuditLog'), {
        action, detail,
        adminUid: currentAdminUid || 'unknown',
        timestamp: Date.now()
      });
    } catch(e) { /* logging failure should never block the action */ }
  }

  // ================= LOGIN =================
  const loginBtn = document.getElementById('loginBtn');
  const loginStatus = document.getElementById('loginStatus');

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value;
    if (!email || !pass) {
      loginStatus.className = 'status-msg error';
      loginStatus.textContent = 'Isi email dan password.';
      return;
    }

    loginBtn.disabled = true;
    loginStatus.className = 'status-msg';
    loginStatus.textContent = 'Memverifikasi...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      const uid = cred.user.uid;

      // Verify this uid is explicitly listed as admin.
      // This node is server-controlled: client cannot write to it (see Rules).
      const adminSnap = await get(ref(db, 'adminUsers/' + uid));
      if (!adminSnap.exists() || adminSnap.val() !== true) {
        await logAction('LOGIN_DENIED_NOT_ADMIN', email).catch(()=>{});
        await signOut(auth);
        loginStatus.className = 'status-msg error';
        loginStatus.textContent = 'Akun ini tidak memiliki akses admin.';
        loginBtn.disabled = false;
        return;
      }

      currentAdminUid = uid;
      await logAction('LOGIN_SUCCESS', email);
      // onAuthStateChanged will handle UI switch
    } catch (err) {
      await logAction('LOGIN_FAILED', email + ' :: ' + (err.code || err.message)).catch(()=>{});
      loginStatus.className = 'status-msg error';
      loginStatus.textContent = 'Login gagal: email/password salah.';
      loginBtn.disabled = false;
    }
  });

  document.getElementById('adminPass').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await logAction('LOGOUT', currentAdminUid);
    await signOut(auth);
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      return;
    }
    // re-verify admin status on every auth state change (covers page refresh)
    const adminSnap = await get(ref(db, 'adminUsers/' + user.uid)).catch(()=>null);
    if (!adminSnap || !adminSnap.exists() || adminSnap.val() !== true) {
      await signOut(auth);
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      loginStatus.className = 'status-msg error';
      loginStatus.textContent = 'Sesi tidak sah. Akun bukan admin.';
      return;
    }
    currentAdminUid = user.uid;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initAdminApp();
  });

  // idle auto-logout after 15 minutes of inactivity
  let idleTimer;
  function resetIdleTimer(){
    clearTimeout(idleTimer);
    idleTimer = setTimeout(async () => {
      if (auth.currentUser) {
        await logAction('AUTO_LOGOUT_IDLE', currentAdminUid);
        await signOut(auth);
      }
    }, 15 * 60 * 1000);
  }
  ['click','keydown','mousemove','touchstart'].forEach(evt =>
    document.addEventListener(evt, resetIdleTimer)
  );
  resetIdleTimer();

  // ================= TABS =================
  function initTabs(){
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.getAttribute('data-tab')).classList.add('active');
      });
    });
  }

  function escapeHtml(str){
    return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function timeAgo(ts){
    if (!ts) return '-';
    const diff = Math.floor((Date.now() - ts)/1000);
    if (diff < 60) return `${diff}s lalu`;
    if (diff < 3600) return `${Math.floor(diff/60)}m lalu`;
    if (diff < 86400) return `${Math.floor(diff/3600)}j lalu`;
    return `${Math.floor(diff/86400)}h lalu`;
  }

  let appInitialized = false;
  function initAdminApp(){
    if (appInitialized) return; // avoid duplicate listeners on repeated auth events
    appInitialized = true;
    initTabs();
    initOverview();
    initCodeGen();
    initGroupsAdmin();
    initSessionsAdmin();
    initAuditLogView();
  }

  // ================= OVERVIEW =================
  function initOverview(){
    const statRow = document.getElementById('statRow');
    function render(counts){
      statRow.innerHTML = `
        <div class="stat-card"><div class="num">${counts.threads}</div><div class="lbl">Total Post Forum</div></div>
        <div class="stat-card"><div class="num">${counts.groupsPending}</div><div class="lbl">Grup Menunggu</div></div>
        <div class="stat-card"><div class="num">${counts.groupsApproved}</div><div class="lbl">Grup Aktif</div></div>
        <div class="stat-card"><div class="num">${counts.sessions}</div><div class="lbl">Sesi Aktif</div></div>
        <div class="stat-card"><div class="num">${counts.codesUnused}</div><div class="lbl">Kode Belum Dipakai</div></div>
      `;
    }
    const counts = { threads:0, groupsPending:0, groupsApproved:0, sessions:0, codesUnused:0 };

    onValue(ref(db, 'threads'), snap => { counts.threads = snap.size || 0; render(counts); });
    onValue(ref(db, 'groups'), snap => {
      let p=0, a=0;
      snap.forEach(c => { const v=c.val(); if(v.status==='pending') p++; if(v.status==='approved') a++; });
      counts.groupsPending = p; counts.groupsApproved = a; render(counts);
    });
    onValue(ref(db, 'sessions'), snap => {
      let active=0;
      const now = Date.now();
      snap.forEach(c => { const v=c.val(); if(!v.revoked && v.expiresAt > now) active++; });
      counts.sessions = active; render(counts);
    });
    onValue(ref(db, 'accessCodes'), snap => {
      let unused=0;
      snap.forEach(c => { if(c.val().used === false) unused++; });
      counts.codesUnused = unused; render(counts);
    });
  }

  // ================= ACCESS CODES =================
  function initCodeGen(){
    document.getElementById('genCodeBtn').addEventListener('click', async () => {
      const hours = parseInt(document.getElementById('codeHours').value, 10) || 24;
      const code = Array.from(crypto.getRandomValues(new Uint8Array(20)))
        .map(b => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[b % 36]).join('');

      const now = Date.now();
      const expiresAt = now + (hours * 60 * 60 * 1000);

      await set(ref(db, 'accessCodes/' + code), {
        used: false, createdAt: now, expiresAt
      });
      await logAction('GENERATE_CODE', `${code} (${hours}h)`);

      document.getElementById('codeOut').textContent = code;
    });

    onValue(ref(db, 'accessCodes'), (snap) => {
      const items = [];
      snap.forEach(c => items.push({ code: c.key, ...c.val() }));
      items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
      const listEl = document.getElementById('codesList');
      if (items.length === 0) { listEl.innerHTML = '<div class="empty">Belum ada kode.</div>'; return; }
      listEl.innerHTML = items.slice(0,50).map(c => `
        <div class="item">
          <div class="row">
            <div>
              <h4 style="font-family:monospace">${escapeHtml(c.code)}</h4>
              <div class="meta">Dibuat ${timeAgo(c.createdAt)} • Kedaluwarsa ${timeAgo(c.expiresAt)}</div>
            </div>
            <span class="pill ${c.used ? 'rejected' : 'approved'}">${c.used ? 'TERPAKAI' : 'AKTIF'}</span>
          </div>
        </div>
      `).join('');
    });
  }

  // ================= GROUPS MODERATION =================
  function initGroupsAdmin(){
    onValue(ref(db, 'groups'), (snap) => {
      const items = [];
      snap.forEach(c => items.push({ id: c.key, ...c.val() }));
      items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
      const listEl = document.getElementById('groupsList');
      if (items.length === 0) { listEl.innerHTML = '<div class="empty">Belum ada permintaan grup.</div>'; return; }

      listEl.innerHTML = items.map(g => `
        <div class="item">
          <div class="row">
            <div>
              <h4>${escapeHtml(g.name)}</h4>
              <div class="meta">Ketua: ${escapeHtml(g.leader)} • ${timeAgo(g.createdAt)}</div>
              <div class="desc"><b>Tujuan:</b> ${escapeHtml(g.purpose)}<br><b>Kebutuhan:</b> ${escapeHtml(g.need)}</div>
            </div>
            <span class="pill ${g.status}">${g.status === 'approved' ? 'AKTIF' : g.status === 'pending' ? 'MENUNGGU' : 'DITOLAK'}</span>
          </div>
          <div class="actions" style="margin-top:10px;">
            ${g.status === 'pending' ? `
              <button class="btn small" data-approve="${g.id}">Setujui</button>
              <button class="btn small danger" data-reject="${g.id}">Tolak</button>
            ` : `<button class="btn small danger" data-delete="${g.id}">Hapus</button>`}
          </div>
        </div>
      `).join('');

      listEl.querySelectorAll('[data-approve]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-approve');
          await update(ref(db, 'groups/' + id), { status: 'approved' });
          await logAction('APPROVE_GROUP', id);
        });
      });
      listEl.querySelectorAll('[data-reject]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-reject');
          await update(ref(db, 'groups/' + id), { status: 'rejected' });
          await logAction('REJECT_GROUP', id);
        });
      });
      listEl.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-delete');
          if (!confirm('Hapus grup ini secara permanen?')) return;
          await remove(ref(db, 'groups/' + id));
          await logAction('DELETE_GROUP', id);
        });
      });
    });
  }

  // ================= SESSIONS =================
  function initSessionsAdmin(){
    onValue(ref(db, 'sessions'), (snap) => {
      const items = [];
      snap.forEach(c => items.push({ token: c.key, ...c.val() }));
      items.sort((a,b) => (b.expiresAt||0) - (a.expiresAt||0));
      const listEl = document.getElementById('sessionsList');
      if (items.length === 0) { listEl.innerHTML = '<div class="empty">Tidak ada sesi.</div>'; return; }

      const now = Date.now();
      listEl.innerHTML = items.slice(0,50).map(s => {
        const isActive = !s.revoked && s.expiresAt > now;
        return `
        <div class="item">
          <div class="row">
            <div>
              <h4 style="font-family:monospace; font-size:11.5px;">${escapeHtml(s.token.slice(0,20))}...</h4>
              <div class="meta">Kedaluwarsa ${timeAgo(s.expiresAt)}</div>
            </div>
            <span class="pill ${isActive ? 'approved' : 'rejected'}">${isActive ? 'AKTIF' : 'MATI'}</span>
          </div>
          ${isActive ? `<div class="actions" style="margin-top:10px;"><button class="btn small danger" data-revoke="${s.token}">Revoke</button></div>` : ''}
        </div>`;
      }).join('');

      listEl.querySelectorAll('[data-revoke]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const token = btn.getAttribute('data-revoke');
          await update(ref(db, 'sessions/' + token), { revoked: true });
          await logAction('REVOKE_SESSION', token);
        });
      });
    });
  }

  // ================= AUDIT LOG VIEW =================
  function initAuditLogView(){
    onValue(ref(db, 'adminAuditLog'), (snap) => {
      const items = [];
      snap.forEach(c => items.push(c.val()));
      items.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
      const listEl = document.getElementById('auditLogList');
      if (items.length === 0) { listEl.innerHTML = '<div class="empty">Belum ada aktivitas tercatat.</div>'; return; }
      listEl.innerHTML = items.slice(0,100).map(l => `
        <div class="log-entry">
          <b>${escapeHtml(l.action)}</b> — ${escapeHtml(l.detail || '')}
          <div style="opacity:0.6; margin-top:2px;">${timeAgo(l.timestamp)} • admin: ${escapeHtml((l.adminUid||'').slice(0,10))}</div>
        </div>
      `).join('');
    });
  }
</script>
</body>
</html>
